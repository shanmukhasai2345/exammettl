<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile | Exammettl</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='Style.css') }}"/>
</head>
<body>
  <div class="container" style="max-width:540px;">
    <div class="page-header">
      <h2>👤 My Profile</h2>
    </div>
    {% if success %}<p class="success-msg">{{ success }}</p>{% endif %}
    {% if error %}<p class="error-msg">{{ error }}</p>{% endif %}
    <form method="POST">
      <label>Full Name</label>
      <input type="text" name="full_name" value="{{ user.profile.full_name if user and user.profile else '' }}" placeholder="Full Name"/>
      <label>Bio</label>
      <textarea name="bio" rows="3">{{ user.profile.bio if user and user.profile else '' }}</textarea>
      <label>New Password <span style="color:var(--text-muted);font-size:12px;">(leave blank to keep current)</span></label>
      <input type="password" name="new_password" placeholder="New Password"/>
      <br/>
      <button type="submit" style="width:100%;margin-top:4px;">Save Changes</button>
    </form>
    <br/>
    <a href="/dashboard"><button class="btn-secondary" style="width:100%;">← Back to Dashboard</button></a>
  </div>

<script>
// Ripple effect on buttons
document.addEventListener('click', function(e) {
  var btn = e.target.closest('button');
  if (!btn) return;
  var r = document.createElement('span');
  r.classList.add('ripple');
  var rect = btn.getBoundingClientRect();
  var size = Math.max(rect.width, rect.height) * 2;
  r.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (e.clientX - rect.left - size/2) + 'px;top:' + (e.clientY - rect.top - size/2) + 'px;';
  btn.appendChild(r);
  setTimeout(function() { r.remove(); }, 500);
});
// Smooth page-out on link navigation
document.querySelectorAll('a[href]').forEach(function(a) {
  a.addEventListener('click', function(e) {
    var href = a.getAttribute('href');
    if (!href || href === '#' || href.startsWith('javascript') || href.startsWith('mailto')) return;
    e.preventDefault();
    document.body.style.transition = 'opacity .25s ease';
    document.body.style.opacity = '0';
    setTimeout(function() { window.location.href = href; }, 240);
  });
});
</script>
</body>
</html>
