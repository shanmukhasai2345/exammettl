<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Exammettl</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='Style.css') }}"/>
</head>
<body>
  <div class="login-box">
    <div class="brand-logo" style="font-size:1.8rem;margin-bottom:8px;display:flex;justify-content:center;">Exammettl</div>
    <p style="color:var(--text-muted);font-size:13px;margin-bottom:24px;">Online Examination Platform</p>
    {% if msg %}<p class="success-msg">{{ msg }}</p>{% endif %}
    {% if error %}<p class="error-msg">{{ error }}</p>{% endif %}
    <form method="POST" autocomplete="off">
      <input type="text" name="username" placeholder="Username" required maxlength="50"/>
      <div style="position:relative;">
        <input type="password" name="password" id="passwordInput" placeholder="Password" required style="padding-right:44px;"/>
        <button type="button" id="togglePassword" onclick="togglePwd()"
          style="position:absolute;right:12px;top:50%;transform:translateY(-58%);
                 background:none;border:none;cursor:pointer;padding:4px;margin:0;
                 color:var(--text-muted);width:auto;box-shadow:none;outline:none;
                 display:flex;align-items:center;justify-content:center;">
          <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               style="display:none;">
            <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      <br/>
      <button type="submit" style="width:100%;margin-top:4px;">Login →</button>
    </form>
    <p style="font-size:13px;color:var(--text-muted);margin-top:18px;">
      <a href="/forgot_password">Forgot Password?</a> &nbsp;·&nbsp;
      <a href="/register">Create Account</a>
    </p>
    <hr style="border:none;border-top:1px solid var(--border);margin:18px 0;"/>
    <a href="/admin_login"><button class="btn-secondary" style="width:100%;">🔐 Admin Login</button></a>
  </div>

<script>
// Password show/hide toggle
function togglePwd() {
  var input = document.getElementById('passwordInput');
  var eyeOn  = document.getElementById('eyeIcon');
  var eyeOff = document.getElementById('eyeOffIcon');
  var btn    = document.getElementById('togglePassword');
  if (input.type === 'password') {
    input.type = 'text';
    eyeOn.style.display  = 'none';
    eyeOff.style.display = 'block';
    btn.style.color = 'var(--accent)';
  } else {
    input.type = 'password';
    eyeOn.style.display  = 'block';
    eyeOff.style.display = 'none';
    btn.style.color = 'var(--text-muted)';
  }
}
// Ripple effect on buttons
document.addEventListener('click', function(e) {
  var btn = e.target.closest('button');
  if (!btn) return;
  var r = document.createElement('span');
  r.classList.add('ripple');
  var rect = btn.getBoundingClientRect();
  var size = Math.max(rect.width, rect.height) * 2;
  r.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (e.clientX - rect.left - size/2) + 'px;top:' + (e.clientY - rect.top - size/2) + 'px;';
  btn.appendChild(r);
  setTimeout(function() { r.remove(); }, 500);
});
// Smooth page-out on link navigation
document.querySelectorAll('a[href]').forEach(function(a) {
  a.addEventListener('click', function(e) {
    var href = a.getAttribute('href');
    if (!href || href === '#' || href.startsWith('javascript') || href.startsWith('mailto')) return;
    e.preventDefault();
    document.body.style.transition = 'opacity .25s ease';
    document.body.style.opacity = '0';
    setTimeout(function() { window.location.href = href; }, 240);
  });
});
</script>
</body>
</html>
