<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | Exammettl</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='Style.css') }}"/>
</head>
<body>
  <div class="login-box">
    <div class="brand-logo" style="justify-content:center;margin-bottom:6px;">Exammettl</div>
    <h2 style="font-size:1rem;color:var(--text-muted);font-weight:500;margin-bottom:24px;">Admin Portal</h2>
    {% if error %}<p class="error-msg">{{ error }}</p>{% endif %}
    <form method="POST" autocomplete="off">
      <input type="text" name="username" placeholder="Admin Username" required/>
      <input type="password" name="password" placeholder="Password" required/>
      <br/>
      <button type="submit" style="width:100%;margin-top:4px;">Login</button>
    </form>
    <hr style="border:none;border-top:1px solid var(--border);margin:18px 0;"/>
    <a href="/"><button class="btn-secondary" style="width:100%;">← Back to Student Login</button></a>
  </div>

<script>
// Ripple effect on buttons
document.addEventListener('click', function(e) {
  var btn = e.target.closest('button');
  if (!btn) return;
  var r = document.createElement('span');
  r.classList.add('ripple');
  var rect = btn.getBoundingClientRect();
  var size = Math.max(rect.width, rect.height) * 2;
  r.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (e.clientX - rect.left - size/2) + 'px;top:' + (e.clientY - rect.top - size/2) + 'px;';
  btn.appendChild(r);
  setTimeout(function() { r.remove(); }, 500);
});
// Smooth page-out on link navigation
document.querySelectorAll('a[href]').forEach(function(a) {
  a.addEventListener('click', function(e) {
    var href = a.getAttribute('href');
    if (!href || href === '#' || href.startsWith('javascript') || href.startsWith('mailto')) return;
    e.preventDefault();
    document.body.style.transition = 'opacity .25s ease';
    document.body.style.opacity = '0';
    setTimeout(function() { window.location.href = href; }, 240);
  });
});
</script>
</body>
</html>
